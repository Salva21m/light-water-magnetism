<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Light, Water, and Magnetism</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --muted: #777;
    --bg: #fafaf7;
    --line: #e6e3dc;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #ececec; --muted: #888; --bg: #111; --line: #262626; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
  }
  main { width: 100%; max-width: 22rem; }
  .title {
    font-size: 1.35rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    margin: 0 0 2rem;
    color: var(--fg);
  }
  .title b { font-weight: 600; }
  h1 {
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0 0 1.5rem;
  }
  section + section { margin-top: 2rem; }
  h2 {
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 0 0 0.5rem;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.85rem 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: none; }
  .label { font-weight: 400; }
  .time { font-variant-numeric: tabular-nums; font-weight: 500; }
  .time.dim { color: var(--muted); font-weight: 400; }
  footer {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .err { color: #c0392b; font-size: 0.85rem; text-transform: none; letter-spacing: 0; font-weight: 400; }
  @media (prefers-color-scheme: dark) {
    .err { color: #ff7a6b; }
  }
  #loc { cursor: pointer; display: inline-flex; align-items: center; gap: 0.4rem; }
  #loc::after {
    content: '';
    width: 0.5em; height: 0.5em;
    border-right: 1.5px solid currentColor;
    border-bottom: 1.5px solid currentColor;
    transform: rotate(45deg);
    opacity: 0.5;
    transition: transform 0.15s ease;
  }
  #loc:hover { color: var(--fg); }
  #loc:hover::after { transform: rotate(225deg); opacity: 0.9; }
  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin: -1rem 0 1.5rem;
  }
  .editor { display: none; gap: 0.5rem; margin: 0 0 1.5rem; }
  .editor.show { display: flex; }
  .editor input {
    flex: 1; min-width: 0;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 0.5rem 0.65rem;
    border-radius: 4px;
    font: inherit;
  }
  .editor button {
    background: var(--fg); color: var(--bg);
    border: none; padding: 0 0.9rem; border-radius: 4px;
    font: inherit; font-weight: 500; cursor: pointer;
  }
  .sky { display: block; width: 100%; margin: 0 0 1.5rem; overflow: visible; }
  .sky-arc { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 2 4; }
  .sky-horizon { stroke: var(--line); stroke-width: 1; }
  .sun-disc { fill: #f5b300; }
  .sun-rays { stroke: #f5b300; stroke-width: 2; stroke-linecap: round; transform-origin: center; animation: spin 60s linear infinite; }
  .sun-group.night .sun-disc { fill: #8a8a8a; }
  .sun-group.night .sun-rays { stroke: #8a8a8a; opacity: 0.35; animation: none; }
  .sun-group.golden .sun-disc { fill: #ff8a3d; }
  .sun-group.golden .sun-rays { stroke: #ff8a3d; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .sun-rays { animation: none; }
  }
</style>
</head>
<body>
<main>
  <p class="title"><b>Light</b>, Water, and Magnetism</p>
  <h1 id="loc" title="Click to edit location">Set your location</h1>
  <p class="hint">Click the coordinates to change location.</p>
  <form id="editor" class="editor show">
    <input id="coords" type="text" inputmode="decimal" placeholder="lat, lon (e.g. 38.72, -9.14)" autocomplete="off">
    <button type="submit">Set</button>
    <button type="button" id="useloc" title="Use device location">📍</button>
  </form>
  <svg id="sky" class="sky" viewBox="0 0 300 130" aria-hidden="true">
    <path class="sky-arc" d="M 20 120 A 130 90 0 0 1 280 120" />
    <line class="sky-horizon" x1="0" y1="120" x2="300" y2="120" />
    <g id="sunGroup" class="sun-group" transform="translate(150 30)">
      <g class="sun-rays">
        <line x1="0" y1="-14" x2="0" y2="-22" />
        <line x1="7" y1="-12.12" x2="11" y2="-19.05" />
        <line x1="12.12" y1="-7" x2="19.05" y2="-11" />
        <line x1="14" y1="0" x2="22" y2="0" />
        <line x1="12.12" y1="7" x2="19.05" y2="11" />
        <line x1="7" y1="12.12" x2="11" y2="19.05" />
        <line x1="0" y1="14" x2="0" y2="22" />
        <line x1="-7" y1="12.12" x2="-11" y2="19.05" />
        <line x1="-12.12" y1="7" x2="-19.05" y2="11" />
        <line x1="-14" y1="0" x2="-22" y2="0" />
        <line x1="-12.12" y1="-7" x2="-19.05" y2="-11" />
        <line x1="-7" y1="-12.12" x2="-11" y2="-19.05" />
      </g>
      <circle class="sun-disc" r="9" />
    </g>
  </svg>
  <div id="rows"></div>
  <footer id="foot"></footer>
</main>
<script>
(() => {
  // Sun position math (NOAA-derived). Returns sun altitude in degrees.
  const rad = Math.PI / 180;
  const dayMs = 1000 * 60 * 60 * 24;
  const J1970 = 2440588, J2000 = 2451545;

  const toJulian = d => d.valueOf() / dayMs - 0.5 + J1970;
  const fromJulian = j => new Date((j + 0.5 - J1970) * dayMs);
  const toDays = d => toJulian(d) - J2000;

  const e = rad * 23.4397;
  const declination = (l, b) => Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l));
  const rightAscension = (l, b) => Math.atan2(Math.sin(l) * Math.cos(e) - Math.tan(b) * Math.sin(e), Math.cos(l));
  const siderealTime = (d, lw) => rad * (280.16 + 360.9856235 * d) - lw;
  const altitude = (H, phi, dec) => Math.asin(Math.sin(phi) * Math.sin(dec) + Math.cos(phi) * Math.cos(dec) * Math.cos(H));

  const solarMeanAnomaly = d => rad * (357.5291 + 0.98560028 * d);
  const eclipticLongitude = M => {
    const C = rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
    const P = rad * 102.9372;
    return M + C + P + Math.PI;
  };
  const sunCoords = d => {
    const M = solarMeanAnomaly(d);
    const L = eclipticLongitude(M);
    return { dec: declination(L, 0), ra: rightAscension(L, 0) };
  };
  const getAltitude = (date, lat, lon) => {
    const lw = rad * -lon, phi = rad * lat, d = toDays(date);
    const c = sunCoords(d);
    const H = siderealTime(d, lw) - c.ra;
    return altitude(H, phi, c.dec) / rad; // degrees
  };

  // Sun-times via NOAA hour-angle method for given altitude.
  const J0 = 0.0009;
  const julianCycle = (d, lw) => Math.round(d - J0 - lw / (2 * Math.PI));
  const approxTransit = (Ht, lw, n) => J0 + (Ht + lw) / (2 * Math.PI) + n;
  const solarTransitJ = (ds, M, L) => J2000 + ds + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * L);
  const hourAngle = (h, phi, d) => Math.acos((Math.sin(h) - Math.sin(phi) * Math.sin(d)) / (Math.cos(phi) * Math.cos(d)));

  function getTimes(date, lat, lon) {
    const lw = rad * -lon, phi = rad * lat;
    const d = toDays(date), n = julianCycle(d, lw);
    const ds = approxTransit(0, lw, n);
    const M = solarMeanAnomaly(ds);
    const L = eclipticLongitude(M);
    const dec = declination(L, 0);
    const Jnoon = solarTransitJ(ds, M, L);

    const get = (hDeg, rising) => {
      const h = rad * hDeg;
      const cosH = (Math.sin(h) - Math.sin(phi) * Math.sin(dec)) / (Math.cos(phi) * Math.cos(dec));
      if (cosH > 1 || cosH < -1) return null; // never reaches that altitude today
      const w = Math.acos(cosH);
      const a = approxTransit(w, lw, n);
      const Jset = solarTransitJ(a, M, L);
      const Jrise = Jnoon - (Jset - Jnoon);
      return fromJulian(rising ? Jrise : Jset);
    };

    return {
      daybreak: get(-6, true),     // civil dawn
      sunrise:  get(-0.833, true), // includes atmospheric refraction
      uvaRise:  get(10, true),     // UVA becomes meaningful
      uvbRise:  get(30, true),     // UVB significant (vitamin D threshold)
      noon:     fromJulian(Jnoon),
      uvbEnd:   get(30, false),
      uvaEnd:   get(10, false),
      sunset:   get(-0.833, false),
      noonAlt:  getAltitude(fromJulian(Jnoon), lat, lon),
    };
  }

  const fmt = d => d ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '—';
  const fmtDate = d => d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

  function section(title, t) {
    const rows = [
      ['Daybreak', t.daybreak],
      ['Sunrise',  t.sunrise],
      ['UVA rise', t.uvaRise],
      ['UVB rise', t.uvbRise],
      ['Solar noon', t.noon],
      ['UVB end',  t.uvbEnd],
      ['UVA end',  t.uvaEnd],
      ['Sunset',   t.sunset],
    ];
    const html = rows.map(([l, v]) =>
      `<div class="row"><span class="label">${l}</span><span class="time${v ? '' : ' dim'}">${fmt(v)}</span></div>`
    ).join('');
    let note = '';
    if (!t.uvbRise) note = ` · sun stays below 30° (max ${t.noonAlt.toFixed(0)}°)`;
    return `<section><h2>${title}${note}</h2>${html}</section>`;
  }

  function positionSun(todayTimes) {
    const group = document.getElementById('sunGroup');
    const { sunrise, sunset, uvaRise, uvaEnd } = todayTimes;
    if (!sunrise || !sunset) return;

    const now = Date.now();
    const t = (now - sunrise.getTime()) / (sunset.getTime() - sunrise.getTime());
    const clamped = Math.max(0, Math.min(1, t));
    // Half-ellipse: x = 150 - 130·cos(θ), y = 120 - 90·sin(θ), θ ∈ [0, π]
    const theta = Math.PI * clamped;
    const x = 150 - 130 * Math.cos(theta);
    const y = 120 - 90 * Math.sin(theta);
    group.setAttribute('transform', `translate(${x.toFixed(2)} ${y.toFixed(2)})`);

    group.classList.remove('night', 'golden');
    if (t < 0 || t > 1) group.classList.add('night');
    else if ((uvaRise && now < uvaRise.getTime()) || (uvaEnd && now > uvaEnd.getTime())) group.classList.add('golden');
  }

  let currentCoords = null;
  function render(lat, lon) {
    currentCoords = { lat, lon };
    const today = new Date();
    const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
    const todayTimes = getTimes(today, lat, lon);
    document.getElementById('rows').innerHTML =
      section(fmtDate(today), todayTimes) +
      section(fmtDate(tomorrow), getTimes(tomorrow, lat, lon));
    document.getElementById('foot').textContent =
      'UVA threshold 10° · UVB threshold 30° (vitamin D synthesis)';
    positionSun(todayTimes);
  }

  // Re-position sun every minute so it tracks real time.
  setInterval(() => {
    if (currentCoords) positionSun(getTimes(new Date(), currentCoords.lat, currentCoords.lon));
  }, 60000);

  const KEY = 'sun-times-loc';
  const locEl = document.getElementById('loc');
  const editor = document.getElementById('editor');
  const coordsInput = document.getElementById('coords');
  const useLocBtn = document.getElementById('useloc');

  function setLocLabel(lat, lon) {
    const ns = lat >= 0 ? 'N' : 'S', ew = lon >= 0 ? 'E' : 'W';
    locEl.textContent = `${Math.abs(lat).toFixed(2)}°${ns}, ${Math.abs(lon).toFixed(2)}°${ew}`;
    locEl.title = 'Click to change location';
  }

  function use(lat, lon, persist = true) {
    if (persist) localStorage.setItem(KEY, JSON.stringify({ lat, lon }));
    editor.classList.remove('show');
    setLocLabel(lat, lon);
    render(lat, lon);
  }

  function noteError(msg) {
    document.getElementById('foot').innerHTML = `<span class="err">${msg}</span>`;
  }

  locEl.addEventListener('click', () => {
    editor.classList.toggle('show');
    if (editor.classList.contains('show')) coordsInput.focus();
  });

  editor.addEventListener('submit', e => {
    e.preventDefault();
    const m = coordsInput.value.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);
    if (!m) { coordsInput.focus(); return; }
    const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
    if (lat < -90 || lat > 90 || lon < -180 || lon > 180) { coordsInput.focus(); return; }
    use(lat, lon);
  });

  useLocBtn.addEventListener('click', () => {
    if (!navigator.geolocation) { noteError('Geolocation not supported'); return; }
    locEl.textContent = 'Locating…';
    navigator.geolocation.getCurrentPosition(
      pos => use(pos.coords.latitude, pos.coords.longitude),
      err => {
        locEl.textContent = 'Set your location';
        noteError(err.message || 'Geolocation failed');
      },
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 }
    );
  });

  // Restore last location, or fall back to default (Miyazaki City, Japan).
  let restored = false;
  try {
    const cached = localStorage.getItem(KEY);
    if (cached) { const { lat, lon } = JSON.parse(cached); use(lat, lon, false); restored = true; }
  } catch (_) {}
  if (!restored) use(31.91, 131.42, false);
})();
</script>
</body>
</html>
